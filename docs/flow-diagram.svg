<svg width="100%" viewBox="0 0 680 900" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Product Update Digest – system architecture infographic</title>
<defs>
<style>
text{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:12px}
line,path{fill:none;stroke:rgb(156,154,146);stroke-width:1.5}
</style>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
  <path d="M2 1L8 5L2 9" stroke="rgb(156,154,146)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<mask id="m" maskUnits="userSpaceOnUse">
  <rect width="680" height="900" fill="white"/>
  <rect x="91.7"  y="121" width="96.7"  height="21.3" fill="black" rx="2"/>
  <rect x="77.3"  y="140" width="125.4" height="19.3" fill="black" rx="2"/>
  <rect x="312.0" y="121" width="56.0"  height="21.3" fill="black" rx="2"/>
  <rect x="309.0" y="140" width="62.0"  height="19.3" fill="black" rx="2"/>
  <rect x="485.3" y="121" width="109.5" height="21.3" fill="black" rx="2"/>
  <rect x="477.3" y="140" width="125.4" height="19.3" fill="black" rx="2"/>
  <rect x="309.9" y="219" width="60.1"  height="21.4" fill="black" rx="2"/>
  <rect x="247.4" y="238" width="185.2" height="19.3" fill="black" rx="2"/>
  <rect x="486"   y="214" width="78.4"  height="19.3" fill="black" rx="2"/>
  <rect x="486"   y="229" width="64.5"  height="19.3" fill="black" rx="2"/>
  <rect x="486"   y="244" width="67.8"  height="19.3" fill="black" rx="2"/>
  <rect x="295.5" y="313" width="89.1"  height="21.4" fill="black" rx="2"/>
  <rect x="273.1" y="332" width="133.8" height="19.3" fill="black" rx="2"/>
  <rect x="458"   y="317" width="97.7"  height="19.3" fill="black" rx="2"/>
  <rect x="352"   y="367" width="92.4"  height="19.3" fill="black" rx="2"/>
  <rect x="280.7" y="404" width="118.6" height="21.3" fill="black" rx="2"/>
  <rect x="257.3" y="423" width="165.4" height="19.3" fill="black" rx="2"/>
  <rect x="321.3" y="474" width="37.5"  height="19.3" fill="black" rx="2"/>
  <rect x="161.2" y="547" width="53.6"  height="21.3" fill="black" rx="2"/>
  <rect x="116.3" y="566" width="143.4" height="19.3" fill="black" rx="2"/>
  <rect x="455"   y="547" width="74.1"  height="21.4" fill="black" rx="2"/>
  <rect x="402.5" y="566" width="178.9" height="19.3" fill="black" rx="2"/>
  <rect x="218.1" y="594" width="243.8" height="19.3" fill="black" rx="2"/>
  <rect x="1.8"   y="436" width="72.4"  height="19.3" fill="black" rx="2"/>
  <rect x="304.7" y="655" width="70.6"  height="21.3" fill="black" rx="2"/>
  <rect x="274.5" y="674" width="131"   height="19.3" fill="black" rx="2"/>
  <rect x="290.9" y="745" width="98.2"  height="21.6" fill="black" rx="2"/>
  <rect x="261.3" y="764" width="157.4" height="19.3" fill="black" rx="2"/>
</mask>
</defs>

<!-- Title -->
<text x="340" y="30" text-anchor="middle" font-size="17" fill="rgb(250,249,245)">Product update digest</text>

<!-- Daily cron badge -->
<g onclick="sendPrompt('How is the daily cron job configured?')">
  <rect x="258" y="42" width="164" height="30" rx="14" fill="rgb(99,56,6)" stroke="rgb(239,159,39)" stroke-width="0.5"/>
  <text x="340" y="57" text-anchor="middle" dominant-baseline="central" fill="rgb(239,159,39)">&#x23F1; daily cron job</text>
</g>

<text x="340" y="90" text-anchor="middle" fill="rgb(194,192,182)">scrape &#x2192; deduplicate &#x2192; summarize &#x2192; store &#x2192; publish</text>

<!-- ROW 1: Sources -->
<g onclick="sendPrompt('What does the Cribl scraper do?')">
  <rect x="65" y="110" width="150" height="52" rx="8" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
  <text x="140" y="132" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="rgb(159,225,203)">Cribl website</text>
  <text x="140" y="150" text-anchor="middle" dominant-baseline="central" fill="rgb(93,202,165)">Blog &#xB7; press &#xB7; product</text>
</g>
<g onclick="sendPrompt('What does the Palo Alto scraper do?')">
  <rect x="265" y="110" width="150" height="52" rx="8" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
  <text x="340" y="132" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="rgb(159,225,203)">Palo Alto</text>
  <text x="340" y="150" text-anchor="middle" dominant-baseline="central" fill="rgb(93,202,165)">XSIAM only</text>
</g>
<g onclick="sendPrompt('What does the Ocient scraper do?')">
  <rect x="465" y="110" width="150" height="52" rx="8" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
  <text x="540" y="132" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="rgb(159,225,203)">Ocient website</text>
  <text x="540" y="150" text-anchor="middle" dominant-baseline="central" fill="rgb(93,202,165)">Blog &#xB7; press &#xB7; product</text>
</g>

<line x1="140" y1="162" x2="270" y2="208" marker-end="url(#arrow)"/>
<line x1="340" y1="162" x2="340" y2="208" marker-end="url(#arrow)"/>
<line x1="540" y1="162" x2="410" y2="208" marker-end="url(#arrow)"/>

<!-- ROW 2: Scraper -->
<g onclick="sendPrompt('How does the scraper work?')">
  <rect x="240" y="208" width="200" height="56" rx="8" fill="rgb(60,52,137)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
  <text x="340" y="230" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="rgb(206,203,246)">Scraper</text>
  <text x="340" y="248" text-anchor="middle" dominant-baseline="central" fill="rgb(175,169,236)">HTTP fetch &#xB7; sitemap discovery</text>
</g>

<line x1="340" y1="264" x2="340" y2="302" marker-end="url(#arrow)"/>

<!-- ROW 3: Deduplication -->
<g onclick="sendPrompt('How does the SQLite deduplication work?')">
  <rect x="240" y="302" width="200" height="56" rx="8" fill="rgb(68,68,65)" stroke="rgb(180,178,169)" stroke-width="0.5"/>
  <text x="340" y="324" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="rgb(211,209,199)">Deduplicate</text>
  <text x="340" y="342" text-anchor="middle" dominant-baseline="central" fill="rgb(180,178,169)">SHA-256 content hash</text>
</g>

<text x="462" y="331" fill="rgb(194,192,182)">Skip unchanged</text>
<line x1="460" y1="331" x2="442" y2="331" mask="url(#m)" stroke-width="0.5" stroke-dasharray="4 3"/>

<line x1="340" y1="358" x2="340" y2="396" marker-end="url(#arrow)"/>
<text x="356" y="381" fill="rgb(194,192,182)">new items only</text>

<!-- ROW 4: LLM Summarizer -->
<g onclick="sendPrompt('How does the LangChain summarization chain work?')">
  <rect x="240" y="396" width="200" height="56" rx="8" fill="rgb(99,56,6)" stroke="rgb(239,159,39)" stroke-width="0.5"/>
  <text x="340" y="415" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="rgb(250,199,117)">LLM summarizer</text>
  <text x="340" y="433" text-anchor="middle" dominant-baseline="central" fill="rgb(239,159,39)">LangChain &#xB7; OpenRouter or Ollama</text>
</g>

<line x1="340" y1="452" x2="340" y2="490" marker-end="url(#arrow)" mask="url(#m)"/>
<text x="340" y="488" text-anchor="middle" fill="rgb(194,192,182)">store</text>

<!-- ROW 5: Storage branches -->
<line x1="310" y1="501" x2="188" y2="536" marker-end="url(#arrow)"/>
<line x1="370" y1="501" x2="492" y2="536" marker-end="url(#arrow)"/>

<!-- SQLite -->
<g onclick="sendPrompt('What data is stored in SQLite?')">
  <rect x="78" y="536" width="220" height="56" rx="8" fill="rgb(68,68,65)" stroke="rgb(180,178,169)" stroke-width="0.5"/>
  <text x="188" y="558" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="rgb(211,209,199)">SQLite</text>
  <text x="188" y="576" text-anchor="middle" dominant-baseline="central" fill="rgb(180,178,169)">Metadata &#xB7; URL tracking</text>
</g>

<!-- sqlite-vec -->
<g onclick="sendPrompt('How is sqlite-vec used for semantic search?')">
  <rect x="382" y="536" width="220" height="56" rx="8" fill="rgb(12,68,124)" stroke="rgb(133,183,235)" stroke-width="0.5"/>
  <text x="492" y="558" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="rgb(181,212,244)">sqlite-vec</text>
  <text x="492" y="576" text-anchor="middle" dominant-baseline="central" fill="rgb(133,183,235)">Vectors &#xB7; chunks &#xB7; RAG Q&amp;A</text>
</g>

<text x="340" y="608" text-anchor="middle" fill="rgb(194,192,182)">cross-referenced via vec_id (MD5 of URL)</text>

<!-- SQLite feedback arrow -->
<path d="M78 564 L44 564 L44 330 L238 330" stroke-dasharray="5 3" stroke-width="1" opacity="0.6" marker-end="url(#arrow)" mask="url(#m)"/>
<text x="38" y="450" text-anchor="middle" transform="rotate(-90,38,450)" fill="rgb(194,192,182)">URL lookup</text>

<!-- Arrows from storage to publisher -->
<line x1="188" y1="592" x2="280" y2="644" marker-end="url(#arrow)" mask="url(#m)"/>
<line x1="492" y1="592" x2="400" y2="644" marker-end="url(#arrow)" mask="url(#m)"/>

<!-- ROW 6: Publisher -->
<g onclick="sendPrompt('How does the publisher push to GitHub Pages?')">
  <rect x="240" y="644" width="200" height="56" rx="8" fill="rgb(113,43,19)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
  <text x="340" y="666" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="rgb(245,196,179)">Publisher</text>
  <text x="340" y="684" text-anchor="middle" dominant-baseline="central" fill="rgb(240,153,123)">Jinja2 &#xB7; Markdown&#x2192;HTML &#xB7; git push</text>
</g>

<line x1="340" y1="700" x2="340" y2="734" marker-end="url(#arrow)"/>

<!-- ROW 7: GitHub Pages -->
<g onclick="sendPrompt('What does the GitHub Pages digest look like?')">
  <rect x="240" y="734" width="200" height="52" rx="8" fill="rgb(39,80,10)" stroke="rgb(151,196,89)" stroke-width="0.5"/>
  <text x="340" y="756" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="rgb(192,221,151)">GitHub Pages</text>
  <text x="340" y="774" text-anchor="middle" dominant-baseline="central" fill="rgb(151,196,89)">Static HTML digest &#xB7; public</text>
</g>

<line x1="340" y1="786" x2="340" y2="820" marker-end="url(#arrow)"/>

<!-- ROW 8: Discord notification -->
<g onclick="sendPrompt('How does the Discord run-complete notification work?')">
  <rect x="220" y="820" width="240" height="52" rx="8" fill="rgb(44,47,100)" stroke="rgb(130,140,210)" stroke-width="0.5"/>
  <text x="340" y="842" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="rgb(185,190,240)">Discord</text>
  <text x="340" y="860" text-anchor="middle" dominant-baseline="central" fill="rgb(130,140,210)">Run-complete notification</text>
</g>
</svg>
